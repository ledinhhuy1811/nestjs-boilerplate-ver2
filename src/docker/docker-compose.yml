services:
  mongodb:
    image: mongo:7
    container_name: nestjs-boilerplate-ver2-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGODB_ROOT_USERNAME:-admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGODB_ROOT_PASSWORD:-root}"
      MONGO_INITDB_DATABASE: "${MONGODB_DATABASE:-nestjs-boilerplate-ver2}"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://127.0.0.1:27017/admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nestjs-boilerplate-ver2-db-network

volumes:
  mongodb_data:
    name: nestjs-boilerplate-ver2-mongodb-data

networks:
  nestjs-boilerplate-ver2-db-network:
    name: nestjs-boilerplate-ver2-db-network
    driver: bridge
